<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotels - Hotel Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">HotelBooking</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/user/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/hotels">Hotels</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/bookings/my-bookings">My Bookings</a>
                </li>
            </ul>
            <div class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user"></i> Account
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/user/profile">Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item">Logout</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h2 th:if="${searchCity}" th:text="'Hotels in ' + ${searchCity}">Hotels in City</h2>
            <h2 th:unless="${searchCity}">All Hotels</h2>

            <!-- Search Bar -->
            <div class="card mb-4">
                <div class="card-body">
                    <form th:action="@{/hotels/search}" method="get" class="row g-3">
                        <div class="col-md-8">
                            <input type="text" name="city" class="form-control"
                                   placeholder="Search by city name..." th:value="${searchCity}">
                        </div>
                        <div class="col-md-4">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-search"></i> Search Hotels
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- No Hotels Found -->
            <div th:if="${hotels.empty}" class="alert alert-info">
                <i class="fas fa-info-circle"></i> No hotels found.
                <a th:href="@{/hotels}" class="alert-link">View all hotels</a>
            </div>

            <!-- Hotels Grid -->
            <div class="row" th:unless="${hotels.empty}">
                <div class="col-md-6 col-lg-4 mb-4" th:each="hotel : ${hotels}">
                    <div class="card h-100 shadow-sm">
                        <img th:src="${hotel.imageUrl != null ? hotel.imageUrl : 'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=400&h=250&fit=crop'}"
                             class="card-img-top" alt="Hotel image"
                             style="height: 200px; object-fit: cover;"
                             onerror="this.src='https://images.unsplash.com/photo-1566073771259-6a8506099945?w=400&h=250&fit=crop'">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${hotel.name}">Hotel Name</h5>
                            <p class="card-text text-muted">
                                <i class="fas fa-map-marker-alt"></i>
                                <span th:text="${hotel.city}">City</span>,
                                <span th:text="${hotel.address}">Address</span>
                            </p>
                            <p class="card-text" th:text="${#strings.abbreviate(hotel.description, 100)}">Description...</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="badge bg-warning text-dark">
                                    <i class="fas fa-star"></i> <span th:text="${hotel.rating}">4.5</span>
                                </span>
                                <a th:href="@{/hotels/{id}(id=${hotel.id})}" class="btn btn-primary btn-sm">
                                    View Details <i class="fas fa-arrow-right"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
