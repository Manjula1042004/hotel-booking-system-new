<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotels - Hotel Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">HotelBooking</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/user/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/hotels">Hotels</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/bookings/my-bookings">My Bookings</a>
                </li>
            </ul>
            <div class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        User
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/user/profile">Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post" class="d-inline">
                                <button type="submit" class="dropdown-item">Logout</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h2 th:if="${searchCity}" th:text="'Hotels in ' + ${searchCity}">Hotels</h2>
            <h2 th:unless="${searchCity}">All Hotels</h2>

            <div class="card mb-4">
                <div class="card-body">
                    <form th:action="@{/hotels/search}" method="get" class="row g-3">
                        <div class="col-md-8">
                            <input type="text" name="city" class="form-control" placeholder="Search by city..." th:value="${searchCity}">
                        </div>
                        <div class="col-md-4">
                            <button type="submit" class="btn btn-primary w-100">Search</button>
                        </div>
                    </form>
                </div>
            </div>

            <div th:if="${hotels.empty}" class="alert alert-info">
                No hotels found. <a th:href="@{/hotels}">View all hotels</a>
            </div>

            <div class="row" th:unless="${hotels.empty}">
                <div class="col-lg-6 mb-4" th:each="hotel : ${hotels}">
                    <div class="card hotel-card h-100">
                        <div class="row g-0 h-100">
                            <div class="col-md-4">
                                <img th:src="${hotel.imageUrl}" class="img-fluid rounded-start h-100 w-100" style="object-fit: cover;" alt="Hotel image">
                            </div>
                            <div class="col-md-8">
                                <div class="card-body d-flex flex-column h-100">
                                    <h5 class="card-title" th:text="${hotel.name}">Hotel Name</h5>
                                    <p class="card-text">
                                        <small class="text-muted" th:text="${hotel.city} + ', ' + ${hotel.address}">Location</small>
                                    </p>
                                    <p class="card-text flex-grow-1" th:text="${hotel.description}">Hotel description</p>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <span class="badge bg-warning" th:text="${hotel.rating} + ' ★'">Rating</span>
                                        </div>
                                        <a th:href="@{/hotels/{id}(id=${hotel.id})}" class="btn btn-primary btn-sm">View Details</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
