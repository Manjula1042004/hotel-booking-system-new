<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">HotelBooking</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/login">Login</a>
            <a class="nav-link" href="/register">Register</a>
        </div>
    </div>
</nav>

<div class="hero-section">
    <div class="container">
        <div class="row align-items-center min-vh-75">
            <div class="col-lg-6">
                <h1 class="display-4 fw-bold text-white mb-4">Find Your Perfect Stay</h1>
                <p class="lead text-white mb-4">Discover amazing hotels at the best prices</p>

                <div class="search-box bg-white p-4 rounded shadow">
                    <form th:action="@{/search}" method="get" class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Destination</label>
                            <input type="text" name="city" class="form-control" placeholder="Enter city" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Check-in</label>
                            <input type="date" name="checkInDate" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Check-out</label>
                            <input type="date" name="checkOutDate" class="form-control" required>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">Search</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<section class="py-5">
    <div class="container">
        <h2 class="text-center mb-5">Popular Destinations</h2>
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card destination-card">
                    <img src="/images/new-york.jpg" class="card-img-top" alt="New York">
                    <div class="card-body">
                        <h5 class="card-title">New York</h5>
                        <p class="card-text">The city that never sleeps</p>
                        <a th:href="@{/hotels/search(city='New York')}" class="btn btn-outline-primary">Explore</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card destination-card">
                    <img src="/images/paris.jpg" class="card-img-top" alt="Paris">
                    <div class="card-body">
                        <h5 class="card-title">Paris</h5>
                        <p class="card-text">City of love and lights</p>
                        <a th:href="@{/hotels/search(city='Paris')}" class="btn btn-outline-primary">Explore</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card destination-card">
                    <img src="/images/tokyo.jpg" class="card-img-top" alt="Tokyo">
                    <div class="card-body">
                        <h5 class="card-title">Tokyo</h5>
                        <p class="card-text">Modern meets traditional</p>
                        <a th:href="@{/hotels/search(city='Tokyo')}" class="btn btn-outline-primary">Explore</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="bg-dark text-white py-4 mt-5">
    <div class="container text-center">
        <p>&copy; 2024 Hotel Booking System. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
