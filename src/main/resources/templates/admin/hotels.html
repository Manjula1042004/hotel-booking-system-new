<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Hotels - Hotel Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">HotelBooking</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/admin/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/users">Users</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/admin/hotels">Hotels</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/bookings">Bookings</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/payments">Payments</a>
                </li>
            </ul>
            <div class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        Admin
                    </a>
                    <ul class="dropdown-menu">
                        <li>
                            <form th:action="@{/logout}" method="post" class="d-inline">
                                <button type="submit" class="dropdown-item">Logout</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Manage Hotels</h2>
        <a th:href="@{/admin/hotels/new}" class="btn btn-primary">Add New Hotel</a>
    </div>

    <div class="card">
        <div class="card-body">
            <div th:if="${hotels.empty}" class="alert alert-info">
                No hotels found. <a th:href="@{/admin/hotels/new}">Add the first hotel</a>
            </div>

            <div class="table-responsive" th:unless="${hotels.empty}">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>City</th>
                        <th>Address</th>
                        <th>Rating</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="hotel : ${hotels}">
                        <td th:text="${hotel.id}">1</td>
                        <td th:text="${hotel.name}">Hotel Name</td>
                        <td th:text="${hotel.city}">City</td>
                        <td th:text="${hotel.address}">Address</td>
                        <td>
                            <span class="badge bg-warning" th:text="${hotel.rating} + ' ★'">4.5 ★</span>
                        </td>
                        <td th:text="${#temporals.format(hotel.createdAt, 'MMM dd, yyyy')}">Jan 01, 2024</td>
                        <td>
                            <a th:href="@{/admin/hotels/{id}/edit(id=${hotel.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                            <form th:action="@{/admin/hotels/{id}/delete(id=${hotel.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
