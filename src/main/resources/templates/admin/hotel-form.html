<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${hotel.id != null} ? 'Edit Hotel' : 'Add Hotel'">Hotel Form - Hotel Booking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">HotelBooking</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/admin/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/users">Users</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/admin/hotels">Hotels</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/bookings">Bookings</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/payments">Payments</a>
                </li>
            </ul>
            <div class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        Admin
                    </a>
                    <ul class="dropdown-menu">
                        <li>
                            <form th:action="@{/logout}" method="post" class="d-inline">
                                <button type="submit" class="dropdown-item">Logout</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 th:text="${hotel.id != null} ? 'Edit Hotel' : 'Add New Hotel'">Hotel Form</h4>
                </div>
                <div class="card-body">
                    <!-- FIXED: Correct ternary syntax for form action -->
                    <form th:action="${hotel.id != null} ? @{/admin/hotels/{id}(id=${hotel.id})} : @{/admin/hotels}"
                          method="post" th:object="${hotel}">

                        <div class="mb-3">
                            <label for="name" class="form-label">Hotel Name *</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}"
                                   placeholder="Enter hotel name" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="city" class="form-label">City *</label>
                                    <input type="text" class="form-control" id="city" th:field="*{city}"
                                           placeholder="Enter city" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="rating" class="form-label">Rating *</label>
                                    <input type="number" class="form-control" id="rating" th:field="*{rating}"
                                           min="0" max="5" step="0.1" placeholder="4.5" required>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="address" class="form-label">Address *</label>
                            <textarea class="form-control" id="address" th:field="*{address}"
                                      rows="2" placeholder="Enter full address" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" th:field="*{description}"
                                      rows="3" placeholder="Describe the hotel..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="imageUrl" class="form-label">Image URL</label>
                            <input type="url" class="form-control" id="imageUrl" th:field="*{imageUrl}"
                                   placeholder="https://example.com/hotel-image.jpg">
                            <div class="form-text">Provide a URL for the hotel image</div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i>
                                <span th:text="${hotel.id != null} ? 'Update Hotel' : 'Create Hotel'">Save</span>
                            </button>
                            <a th:href="@{/admin/hotels}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Form validation
        const form = document.querySelector('form');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', function(e) {
            const name = document.getElementById('name').value.trim();
            const city = document.getElementById('city').value.trim();
            const address = document.getElementById('address').value.trim();
            const rating = document.getElementById('rating').value;

            if (!name || !city || !address || !rating) {
                e.preventDefault();
                alert('Please fill in all required fields');
                return false;
            }

            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
        });
    });
</script>
</body>
</html>
