# PostgreSQL Configuration
spring.datasource.driver-class-name=org.postgresql.Driver

# Use individual credentials instead of full URL to avoid encoding issues
spring.datasource.url=jdbc:postgresql://dpg-d6rffsn5r7bs738vo78g-a/hotel_booking_db_achw?sslmode=require
spring.datasource.username=hotel_booking_db_achw_user
spring.datasource.password=aoPimotxlSr8Oo0ENvCBMDPW77hq2G73

# IMPORTANT: Set to create-drop for FIRST deployment only!
# This will create all tables with correct PostgreSQL syntax
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Force PostgreSQL dialect
spring.jpa.database=POSTGRESQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable MySQL-specific features
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Use proper PostgreSQL column types
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000

# Server Configuration - CRITICAL for Render
server.port=${PORT:8080}
server.address=0.0.0.0

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# JWT Configuration
jwt.secret=${JWT_SECRET:mySuperSecretKeyForHotelBookingSystem2024}
jwt.expiration=86400000

# RazorPay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_xxx}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:test_secret}

# Logging
logging.level.com.hotel.booking_system=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE