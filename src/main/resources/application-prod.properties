# =============================================
# HOTEL BOOKING SYSTEM - PRODUCTION PROFILE
# =============================================

# PostgreSQL Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATABASE_URL}

# !!! TEMPORARILY SET TO 'create-drop' TO RESET THE SCHEMA !!!
# This will drop and recreate all tables based on your current entities.
# After a successful deploy, you should change this back to 'update'.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable all backtick quoting for PostgreSQL
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true

# Use standard naming strategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

# Tell Hibernate we're using PostgreSQL
spring.jpa.database=POSTGRESQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0

# Thymeleaf
spring.thymeleaf.cache=true

# Logging
logging.level.com.hotel.booking_system=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN