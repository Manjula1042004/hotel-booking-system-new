# =============================================
# HOTEL BOOKING SYSTEM - PRODUCTION PROFILE
# =============================================

# REMOVE THIS LINE IF IT EXISTS:
# spring.profiles.active=prod  ? DELETE THIS LINE!

# PostgreSQL Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DATABASE_URL}

# JPA Configuration for PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# IMPORTANT: Let Hibernate auto-detect the dialect
# DO NOT specify any dialect property

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Server Configuration - CRITICAL for Render
server.port=${PORT:8080}
server.address=0.0.0.0

# Thymeleaf
spring.thymeleaf.cache=true

# Logging
logging.level.com.hotel.booking_system=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN