# =============================================
# HOTEL BOOKING SYSTEM - MAIN CONFIGURATION
# =============================================

# Active Profile (Development by default, Production on Render)
spring.profiles.active=dev

# ??? REMOVED ALL DATABASE CONFIGURATION ???
# Database configuration is now in profile-specific files

# Server Configuration (Development)
server.port=8080
server.servlet.context-path=/

# Thymeleaf Configuration (Development - No Cache)
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html

# JWT Configuration
jwt.secret=mySuperSecretKeyForHotelBookingSystem2024MakeItVeryLongAndSecure
jwt.expiration=86400000

# RazorPay Configuration (Test Keys)
razorpay.key.id=rzp_test_xxx
razorpay.key.secret=test_secret

# Email Configuration (Development - Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Logging (Development - Verbose)
logging.level.com.hotel.booking_system=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Security (Development settings)
spring.security.filter.order=10

# Actuator Endpoints (For monitoring)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# HTTP/2 Support
server.http2.enabled=true

# Compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Basic app info
spring.application.name=hotel-booking-system

# Actuator for health checks