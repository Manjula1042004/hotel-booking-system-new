# =============================================
# HOTEL BOOKING SYSTEM - MAIN CONFIGURATION
# =============================================

# Active Profile (Render will override to prod)
spring.profiles.active=prod

# Server Configuration
server.port=8080
server.address=0.0.0.0
server.servlet.context-path=/

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Static Resources
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true

# JWT Configuration (uses environment variables in prod)
jwt.secret=${JWT_SECRET:mySuperSecretKeyForDevOnly}
jwt.expiration=86400000

# RazorPay Configuration (uses environment variables in prod)
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_xxx}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:test_secret}

# Email Configuration (disabled by default)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:}
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false