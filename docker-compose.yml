version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: hotel_booking_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: hotel_booking_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql  # This line mounts our init script
    networks:
      - hotel-booking-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  # Spring Boot Application
  app:
    build: .
    container_name: hotel_booking_app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/hotel_booking_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=app_user
      - SPRING_DATASOURCE_PASSWORD=app_password
      - RAZORPAY_KEY_ID=rzp_test_xxx
      - RAZORPAY_KEY_SECRET=test_secret
      - SMTP_HOST=smtp.gmail.com
      - SMTP_USERNAME=your_email@gmail.com
      - SMTP_PASSWORD=your_app_password
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hotel-booking-network
    restart: unless-stopped

  # Adminer (Database Management UI - Optional)
  adminer:
    image: adminer
    container_name: hotel_booking_adminer
    ports:
      - "8081:8080"
    networks:
      - hotel-booking-network
    depends_on:
      - mysql

networks:
  hotel-booking-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local